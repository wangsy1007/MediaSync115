services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediasync115-backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./backend/data:/app/data
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=10)"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mediasync115-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
