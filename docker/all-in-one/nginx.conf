user www-data;
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    server {
        listen 5173;
        listen 9008;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location = /healthz {
            proxy_pass http://127.0.0.1:8000/health;
            proxy_http_version 1.1;
            proxy_connect_timeout 2s;
            proxy_send_timeout 2s;
            proxy_read_timeout 2s;
            proxy_next_upstream off;
            proxy_intercept_errors on;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            error_page 502 503 504 = @health_unavailable;
        }

        location @health_unavailable {
            return 503;
        }

        # 115/夸克转存可能耗时数分钟，需长于默认 API 超时
        location ~ ^/api/(pan115/share/save(-to-folder|-files-to-folder|-batch|-all)?|quark/share/save-to-folder)$ {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_connect_timeout 5s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_next_upstream off;
            proxy_intercept_errors off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_connect_timeout 5s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_next_upstream off;
            proxy_intercept_errors off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Emby 代理端口：Emby Client 连接此端口，视频流请求 302 到 STRM/115 直链
    server {
        listen 8099;
        server_name _;

        # 拦截 STRM / 115 直链解析 → FastAPI（对齐 qmediasync）
        location /api/strm/play/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header User-Agent $http_user_agent;
            proxy_read_timeout 30s;
        }

        location /api/115/url/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header User-Agent $http_user_agent;
            proxy_read_timeout 30s;
        }

        location /api/proxy-115 {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
            proxy_buffering off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # 改写 PlaybackInfo：强制 STRM DirectPlay，避免 Emby 转码中转
        location ~* ^/(?:emby/)?Items/([^/]+)/PlaybackInfo$ {
            proxy_pass http://127.0.0.1:8000/api/emby/playbackinfo/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Content-Type $http_content_type;
            proxy_pass_request_body on;
            proxy_read_timeout 60s;
        }

        # 拦截 Emby 视频流：跟随直链后 307 到 CDN（含 proxy-115 时回源）
        location ~* ^/(?:emby/)?[Vv]ideos/([^/]+)/(?:stream|original)(?:\.[^/?]*)?$ {
            proxy_intercept_errors on;
            proxy_pass http://127.0.0.1:8000/api/emby/stream-redirect/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
            proxy_buffering off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            error_page 404 502 503 504 = @emby_upstream;
        }

        # 其他所有 Emby 请求透明转发到真实 Emby 服务器
        location / {
            proxy_pass http://__EMBY_HOST__:__EMBY_PORT__;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location @emby_upstream {
            proxy_pass http://__EMBY_HOST__:__EMBY_PORT__;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
